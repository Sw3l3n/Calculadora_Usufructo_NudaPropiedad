<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MarBlau - Plusvalía Municipal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body onload="iniciarApp()">

    <div id="login-box" class="contenedor" style="margin-top: 100px;">
        <div class="tarjeta" style="text-align: center;">
            <img src="logom.png" alt="MarBlau" style="max-width: 180px; margin-bottom: 20px;">
            <p style="font-weight: 700; color: #64748b; margin-bottom: 20px;">SISTEMA DE CÁLCULO PRIVADO</p>
            <input type="password" id="pass_input" style="text-align: center; width: 100%; max-width: 300px; margin-bottom: 15px;" placeholder="Contraseña">
            <button class="btn-calcular" style="display: block; margin: auto; width: 100%; max-width: 300px;" onclick="comprobarPass()">Entrar</button>
        </div>
    </div>

    <div id="contenido-privado" class="contenedor hidden">
        <div class="nav-menu">
            <button onclick="location.href='index.html'">Usufructo</button>
            <button class="activo">Plusvalía</button>
            <button onclick="cerrarSesion()" style="background:#fee2e2; color:#ef4444;">Salir</button>
        </div>

        <div class="tarjeta">
            <div style="text-align: center; margin-bottom: 20px;"><img src="logom.png" style="max-width: 100px;"></div>
            <h1 style="text-align: center; margin-bottom: 30px;">Cálculo de Plusvalía</h1>
            
            <div class="fila-inputs">
                <div class="campo" style="flex: 1;">
                    <label>Valor Catastral Suelo (€)</label>
                    <input type="number" id="v_suelo" placeholder="Ej: 60000" style="font-weight: 800; font-size: 20px;">
                </div>
                <div class="campo" style="flex: 1;">
                    <label>Años de Tenencia</label>
                    <input type="number" id="años_tenencia" placeholder="Ej: 10">
                </div>
            </div>

            <div class="fila-inputs">
                <div class="campo" style="flex: 1;">
                    <label>Tipo Impositivo (%)</label>
                    <input type="number" id="tipo_itp" value="30">
                </div>
                <div class="campo" style="flex: 1;">
                    <label>Coeficiente (%)</label>
                    <input type="number" id="coeficiente" placeholder="Ej: 0.15">
                </div>
            </div>
            
            <div style="margin-top: 25px;">
                <button class="btn-calcular" onclick="calcularPlusvaliaSimple()" style="width: 100%;">Calcular Cuota</button>
            </div>
        </div>

        <div id="seccion-informe" class="tarjeta hidden">
            <h2 style="margin-top: 0; font-size: 18px; color: var(--accent-color); border-bottom: 1px solid #e2e8f0; padding-bottom: 10px;">Resultado del Cálculo</h2>
            
            <div id="metadatos-azul" class="bloque-resumen-azul"></div>
            
            <div id="resultados-lista">
                </div>
        </div>
    </div>

    <script>
        const CLAVE = "pagame";

        function iniciarApp() {
            if(sessionStorage.getItem('sesion_marblau') === 'ok') verificarAcceso();
        }

        function comprobarPass() {
            if(document.getElementById('pass_input').value === CLAVE) {
                sessionStorage.setItem('sesion_marblau', 'ok');
                verificarAcceso();
            } else { alert("Acceso denegado"); }
        }

        function verificarAcceso() {
            if(sessionStorage.getItem('sesion_marblau') === 'ok') {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('contenido-privado').classList.remove('hidden');
            }
        }

        function cerrarSesion() { sessionStorage.clear(); location.reload(); }

        function calcularPlusvaliaSimple() {
            const v_suelo = parseFloat(document.getElementById('v_suelo').value);
            const años = document.getElementById('años_tenencia').value;
            const tipo = parseFloat(document.getElementById('tipo_itp').value) / 100;
            const coef = parseFloat(document.getElementById('coeficiente').value) / 100;

            if(!v_suelo || !tipo || !coef) return alert("Faltan datos");

            const baseImponible = v_suelo * coef;
            const cuota = baseImponible * tipo;

            const cajaAzul = document.getElementById('metadatos-azul');
            cajaAzul.innerHTML = `
                <div class="resumen-linea-1">Cuota Tributaria: ${cuota.toLocaleString('es-ES', {minimumFractionDigits:2})} €</div>
                <div class="resumen-linea-2">Base Imponible: ${baseImponible.toLocaleString('es-ES', {minimumFractionDigits:2})} €</div>
            `;

            document.getElementById('resultados-lista').innerHTML = `
                <div class="resultado-titular">
                    <span class="nombre-titular">DESGLOSE OBJETIVO</span>
                    <div class="detalle-item">• Valor Suelo: ${v_suelo.toLocaleString('es-ES')} €</div>
                    <div class="detalle-item">• Coeficiente aplicado: ${(coef * 100).toFixed(2)}%</div>
                    <div class="detalle-item">• Tipo Impositivo: ${(tipo * 100).toFixed(2)}%</div>
                    <div class="total-titular">Total a pagar: ${cuota.toLocaleString('es-ES', {minimumFractionDigits:2})} €</div>
                </div>
            `;

            document.getElementById('seccion-informe').classList.remove('hidden');
        }
    </script>
</body>
</html>
