<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MarBlau - Plusvalía</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body onload="verificarAcceso()">

<div id="login-box" class="contenedor" style="margin-top: 100px;">
    <div class="tarjeta" style="text-align: center;">
        <h1>MarBlau</h1>
        <p class="descripcion">Acceso Privado - Gestión de Plusvalías</p>
        <input type="password" id="pass_input" style="text-align: center; max-width: 250px; margin-bottom: 15px;" placeholder="Contraseña">
        <br>
        <button class="btn-calcular" style="max-width: 250px;" onclick="comprobarPass()">ENTRAR</button>
        <p id="error-pass" class="error hidden">Contraseña incorrecta</p>
    </div>
</div>

<div id="contenido-privado" class="contenedor hidden">
    
    <div class="tarjeta nav-menu" style="display: flex; justify-content: center; gap: 10px; margin-bottom: 15px;">
        <button class="btn-añadir" onclick="location.href='index.html'">Usufructo</button>
        <button class="btn-añadir" style="background: #2c3e50; color: white;">Plusvalía</button>
        <button class="btn-borrar" onclick="cerrarSesion()" style="margin-left: 20px;">Salir</button>
    </div>

    <div class="tarjeta">
        <h1>CALCULO PLUSVALIA</h1>
        
        <div class="fila-inputs">
            <div class="campo">
                <label>Fecha de adquisicion (dd/mm/aaaa)</label>
                <input type="date" id="f_compra">
            </div>
            <div class="campo">
                <label>Fecha de venta (actual)</label>
                <input type="date" id="f_venta">
            </div>
        </div>

        <div class="fila-inputs" style="margin-top:20px;">
            <div class="campo">
                <label>Valor del suelo (€)</label>
                <input type="number" id="v_suelo" placeholder="Ej: 17196.71">
            </div>
            <div class="campo">
                <label>Valor construido (€)</label>
                <input type="number" id="v_construido" placeholder="Ej: 22349.64">
            </div>
        </div>

        <div class="fila-inputs" style="margin-top:20px;">
            <div class="campo">
                <label>Precio de compra (€)</label>
                <input type="number" id="p_compra" placeholder="Ej: 6000.00">
            </div>
            <div class="campo">
                <label>Precio de venta (€)</label>
                <input type="number" id="p_venta" placeholder="Ej: 160000.00">
            </div>
        </div>
        
        <div class="botones">
            <button class="btn-calcular" onclick="calcPlus()">CALCULAR</button>
        </div>
    </div>

    <div id="resultado" class="tarjeta hidden">
        <div class="bloque-resumen">
            <div class="dato-info">Periodo: <span id="res-años">0</span> años</div>
            <div class="dato-info">Coeficiente: <span id="res-coef">0</span></div>
        </div>

        <div class="excel-box">
            <div class="excel-header">PLUSVALIA suelo</div>
            <div class="excel-value" id="res-suelo">0,00 €</div>
        </div>
        
        <div class="excel-box" style="margin-top: 15px;">
            <div class="excel-header">PLUSVALIA beneficio</div>
            <div class="excel-value" id="res-beneficio">0,00 €</div>
        </div>

        <div id="status-bar" style="margin-top: 20px; padding: 15px; background: #e8f5e9; color: #2e7d32; text-align: center; font-weight: bold; border-radius: 8px;">
            CÁLCULO CORRECTO
        </div>
    </div>
</div>

<script>
const CLAVE_MAESTRA = "marblau2026"; 

// --- SEGURIDAD ---
function comprobarPass() {
    const input = document.getElementById('pass_input').value;
    if(input === CLAVE_MAESTRA) {
        sessionStorage.setItem('sesion_marblau', 'activa');
        verificarAcceso();
    } else {
        document.getElementById('error-pass').classList.remove('hidden');
    }
}

function verificarAcceso() {
    if(sessionStorage.getItem('sesion_marblau') === 'activa') {
        document.getElementById('login-box').classList.add('hidden');
        document.getElementById('contenido-privado').classList.remove('hidden');
    }
}

function cerrarSesion() {
    sessionStorage.removeItem('sesion_marblau');
    location.reload();
}

// --- LÓGICA DE CÁLCULO (EXCEL) ---
function calcPlus() {
    const vSuelo = parseFloat(document.getElementById('v_suelo').value) || 0;
    const vConstruido = parseFloat(document.getElementById('v_construido').value) || 0;
    const pCompra = parseFloat(document.getElementById('p_compra').value) || 0;
    const pVenta = parseFloat(document.getElementById('p_venta').value) || 0;
    const fCStr = document.getElementById('f_compra').value;
    const fVStr = document.getElementById('f_venta').value;

    if (!fCStr || !fVStr) {
        alert("Introduce las fechas de adquisición y venta.");
        return;
    }

    const fC = new Date(fCStr);
    const fV = new Date(fVStr);

    // 1. Calcular años transcurridos
    let años = fV.getFullYear() - fC.getFullYear();
    if (fV.getMonth() < fC.getMonth() || (fV.getMonth() === fC.getMonth() && fV.getDate() < fC.getDate())) años--;
    
    // 2. Tabla de coeficientes (Fuente: Tu captura de Excel) 
    const coefs = {
        1:0.15, 2:0.14, 3:0.14, 4:0.16, 5:0.18, 6:0.19, 7:0.20, 8:0.19, 9:0.15, 10:0.12,
        11:0.10, 12:0.09, 13:0.09, 14:0.09, 15:0.90, 16:0.10, 17:0.13, 18:0.17, 19:0.23, 20:0.40
    };
    
    const añosCalculo = años <= 0 ? 1 : (años > 20 ? 20 : años);
    const coeficiente = coefs[añosCalculo];

    // 3. Fórmulas corregidas
    // PLUSVALIA SUELO: Suelo * Coeficiente * 30% 
    const resultadoSuelo = vSuelo * coeficiente * 0.30;

    // PLUSVALIA BENEFICIO: (Venta - Compra) * (Suelo / Construido) * 30%
    let resultadoBeneficio = 0;
    if (vConstruido > 0) {
        resultadoBeneficio = (pVenta - pCompra) * (vSuelo / vConstruido) * 0.30;
    }

    // 4. Mostrar resultados
    document.getElementById('resultado').classList.remove('hidden');
    document.getElementById('res-años').innerText = años;
    document.getElementById('res-coef').innerText = coeficiente;
    
    document.getElementById('res-suelo').innerText = resultadoSuelo.toLocaleString('es-ES', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " €";
    
    // Si el beneficio es pérdida, mostramos 0,00€ o el valor negativo según prefieras. 
    // Aquí lo limitamos a 0 para seguir normativa de no pagar en pérdidas.
    const beneficioFinal = resultadoBeneficio > 0 ? resultadoBeneficio : 0;
    document.getElementById('res-beneficio').innerText = beneficioFinal.toLocaleString('es-ES', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " €";
}
</script>
</body>
</html>
