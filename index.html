<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarBlau - CÁLCULOS REPARTO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Estilos específicos para la sección de resultados */
        .resumen-propietario {
            border-left: 4px solid #3b82f6;
            padding: 10px 15px;
            margin-bottom: 20px;
            background: #f8fafc;
            border-radius: 0 8px 8px 0;
        }
        .label-propietario {
            font-size: 14px;
            font-weight: 800;
            color: #475569;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .linea-derecho { font-size: 15px; margin: 4px 0; color: #1e293b; }
        .total-persona {
            font-weight: 700;
            color: #0f172a;
            margin-top: 8px;
            font-size: 16px;
            border-top: 1px solid #e2e8f0;
            padding-top: 5px;
        }
        .info-calculo-azul {
            background: #eff6ff;
            color: #1e40af;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #bfdbfe;
            font-size: 15px;
            font-weight: 600;
        }
        .info-reparto-detallado {
            font-size: 14px;
            color: #475569;
            margin-bottom: 25px;
            padding-left: 5px;
            font-weight: 500;
            line-height: 1.5;
        }
        .tarjeta-total-final {
            border-left: 4px solid #10b981;
            padding: 15px;
            background: #ecfdf5;
            border-radius: 0 8px 8px 0;
            margin-top: 20px;
            text-align: center;
        }
        .btn-pdf {
            background-color: #ef4444 !important;
            color: white !important;
        }
        .btn-pdf:hover { background-color: #dc2626 !important; }
        
        .fila-botones-accion {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body onload="iniciarApp()">

    <div id="login-box" class="contenedor" style="margin-top: 100px; text-align: center;">
        <div class="tarjeta">
            <img src="logom.png" alt="MarBlau" style="max-width: 180px; margin-bottom: 20px;">
            <p style="font-weight: 700; color: #64748b; margin-bottom: 20px;">SISTEMA DE CÁLCULO PRIVADO</p>
            <input type="password" id="pass_input" style="text-align: center; width: 100%; max-width: 300px; margin-bottom: 15px;" placeholder="Contraseña">
            <button class="btn-calcular" style="display: block; margin: auto; max-width: 300px;" onclick="comprobarPass()">ENTRAR</button>
        </div>
    </div>

    <div id="contenido-privado" class="contenedor hidden">
        <div class="nav-menu">
            <button class="activo">Usufructo</button>
            <button onclick="location.href='plusvalia.html'">Plusvalía</button>
            <button onclick="cerrarSesion()" style="background:#fee2e2; color:#ef4444;">Salir</button>
        </div>

        <div class="tarjeta">
            <div style="text-align: center; margin-bottom: 15px;"><img src="logom.png" style="max-width: 90px;"></div>
            <h1>Cálculo de Reparto</h1>
            
            <div class="fila-inputs">
                <div class="campo">
                    <label>VALOR TOTAL PROPIEDAD (€)</label>
                    <input type="number" id="v_prop" placeholder="Ej: 200000" oninput="guardarDatos()">
                </div>
                <div class="campo">
                    <label>FECHA TRANSMISIÓN</label>
                    <input type="date" id="f_trans" oninput="guardarDatos()">
                </div>
            </div>

            <div id="contenedor-titulares"></div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn-añadir" onclick="agregarTitular()">+ Añadir Titular</button>
                <button class="btn-calcular" onclick="calcularReparto()">CALCULAR REPARTO</button>
            </div>
        </div>

        <div id="res-reparto" class="tarjeta hidden">
            <h2 style="text-align:center; text-transform: uppercase;">CÁLCULOS REPARTO</h2>
            
            <div class="fila-botones-accion">
                <button class="btn-copiar-usuf" style="flex:1;" onclick="copiarUsufructo()">Copiar Texto</button>
                <button class="btn-pdf" style="flex:1;" onclick="generarPDF()">Descargar PDF</button>
            </div>
            
            <div id="info-azul" class="info-calculo-azul"></div>
            <div id="info-detallada-pct" class="info-reparto-detallado"></div>
            
            <div id="lista-resultados-usuf"></div>
            <div id="total-verde-final" class="tarjeta-total-final"></div>
            
            <div id="texto-para-copiar" style="display:none;"></div>
        </div>
    </div>

    <script>
        const CLAVE = "marblau2026";

        function iniciarApp() {
            verificarAcceso();
            if (!recuperarDatos()) agregarTitular();
        }

        function comprobarPass() {
            if(document.getElementById('pass_input').value === CLAVE) {
                localStorage.setItem('sesion_marblau', 'ok');
                verificarAcceso();
            } else { alert("Contraseña incorrecta"); }
        }

        function verificarAcceso() {
            if(localStorage.getItem('sesion_marblau') === 'ok') {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('contenido-privado').classList.remove('hidden');
            }
        }

        function cerrarSesion() { localStorage.clear(); location.reload(); }

        function toggleFecha(selectElement) {
            const row = selectElement.parentElement.parentElement;
            const inputFecha = row.querySelector('.t-fecha');
            if (selectElement.value === 'us') {
                inputFecha.disabled = false;
                inputFecha.style.opacity = "1";
            } else {
                inputFecha.value = "";
                inputFecha.disabled = true;
                inputFecha.style.opacity = "0.5";
            }
            guardarDatos();
        }

        function guardarDatos() {
            const titulares = Array.from(document.querySelectorAll('.titular-row')).map(row => ({
                n: row.querySelector('.t-nombre').value,
                t: row.querySelector('.t-tipo').value,
                p: row.querySelector('.t-pct').value,
                f: row.querySelector('.t-fecha').value
            }));
            const datos = { v: document.getElementById('v_prop').value, f: document.getElementById('f_trans').value, tits: titulares };
            localStorage.setItem('datos_usuf', JSON.stringify(datos));
        }

        function recuperarDatos() {
            const data = JSON.parse(localStorage.getItem('datos_usuf'));
            if(data) {
                document.getElementById('v_prop').value = data.v;
                document.getElementById('f_trans').value = data.f;
                data.tits.forEach(t => agregarTitular(t));
                return true;
            }
            return false;
        }

        function agregarTitular(data = null) {
            const div = document.createElement('div');
            div.className = 'titular-row';
            div.style = "display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-end;";
            const isUs = data && data.t === 'us';
            div.innerHTML = `
                <div class="campo" style="flex:2;"><label>Nombre</label><input type="text" class="t-nombre" value="${data?data.n:''}" oninput="guardarDatos()"></div>
                <div class="campo" style="flex:1.5;"><label>Tipo</label>
                    <select class="t-tipo" onchange="toggleFecha(this)">
                        <option value="pd" ${data&&data.t=='pd'?'selected':''}>Pleno Dominio</option>
                        <option value="us" ${data&&data.t=='us'?'selected':''}>Usufructo</option>
                        <option value="np" ${data&&data.t=='np'?'selected':''}>Nuda Propiedad</option>
                    </select>
                </div>
                <div class="campo" style="flex:0.8;"><label>%</label><input type="number" class="t-pct" value="${data?data.p:'100'}" oninput="guardarDatos()"></div>
                <div class="campo" style="flex:1.2;"><label>F. Nac</label><input type="date" class="t-fecha" value="${data?data.f:''}" oninput="guardarDatos()" ${isUs?'':'disabled style="opacity:0.5"'}></div>
                <button class="btn-borrar" onclick="this.parentElement.remove(); guardarDatos();">×</button>
            `;
            document.getElementById('contenedor-titulares').appendChild(div);
        }

        function calcularReparto() {
            const valorTotal = parseFloat(document.getElementById('v_prop').value);
            const fechaTrans = new Date(document.getElementById('f_trans').value);
            if(!valorTotal || isNaN(fechaTrans)) return alert("Faltan datos generales");

            const filas = Array.from(document.querySelectorAll('.titular-row'));
            let edadUsuf = 0;
            let uCoefLegal = 10; 

            const usufructuarios = filas.filter(r => r.querySelector('.t-tipo').value === 'us');
            if (usufructuarios.length > 0) {
                let fechaNacMasReciente = null;
                usufructuarios.forEach(r => {
                    const fNac = new Date(r.querySelector('.t-fecha').value);
                    if (!isNaN(fNac)) if (!fechaNacMasReciente || fNac > fechaNacMasReciente) fechaNacMasReciente = fNac;
                });
                if (fechaNacMasReciente) {
                    edadUsuf = fechaTrans.getFullYear() - fechaNacMasReciente.getFullYear();
                    if (fechaTrans < new Date(fechaTrans.getFullYear(), fechaNacMasReciente.getMonth(), fechaNacMasReciente.getDate())) edadUsuf--;
                    uCoefLegal = Math.max(10, Math.min(70, 89 - edadUsuf));
                }
            } else { uCoefLegal = 0; }

            const usuarios = {};
            let sumPctUs = 0, sumPctNp = 0, sumPctPd = 0;
            let totalGeneral = 0;

            filas.forEach(row => {
                const nombreRaw = row.querySelector('.t-nombre').value.trim() || "Titular";
                const nombre = nombreRaw.charAt(0).toUpperCase() + nombreRaw.slice(1);
                const tipo = row.querySelector('.t-tipo').value;
                const pct = parseFloat(row.querySelector('.t-pct').value) || 0;
                let val = 0, txtTipo = "";

                if (tipo === 'pd') { val = valorTotal * (pct/100); txtTipo = "Pleno dominio"; sumPctPd += pct; }
                else if (tipo === 'us') { val = (valorTotal * (uCoefLegal/100)) * (pct/100); txtTipo = "Usufructo"; sumPctUs += pct; }
                else { val = (valorTotal * (1 - uCoefLegal/100)) * (pct/100); txtTipo = "Nuda propiedad"; sumPctNp += pct; }

                if (!usuarios[nombre]) usuarios[nombre] = { lineas: [], total: 0 };
                usuarios[nombre].lineas.push({ txt: `${txtTipo} (${pct}%)`, val: val });
                usuarios[nombre].total += val;
                totalGeneral += val;
            });

            const fraseAzul = `Edad usufructuario para el calculo: ${edadUsuf > 0 ? edadUsuf : 'N/A'} años, usufructo ${uCoefLegal}%`;
            let fraseDetalle = "Reparto de propiedad: ";
            if(sumPctPd > 0) fraseDetalle += `Pleno dominio: ${sumPctPd}% | `;
            if(sumPctUs > 0) fraseDetalle += `Usufructo: ${sumPctUs}% | `;
            if(sumPctNp > 0) fraseDetalle += `Nuda propiedad: ${sumPctNp}%`;
            if(fraseDetalle.endsWith(' | ')) fraseDetalle = fraseDetalle.slice(0, -3);

            document.getElementById('info-azul').innerText = fraseAzul;
            document.getElementById('info-detallada-pct').innerText = fraseDetalle;

            let html = "";
            let copy = `CÁLCULOS REPARTO\n\n${fraseAzul}\n${fraseDetalle}\n\n`;

            for (const n in usuarios) {
                html += `<div class="resumen-propietario"><div class="label-propietario">Propietario: ${n}</div>`;
                copy += `Propietario: ${n}\n`;
                usuarios[n].lineas.forEach(l => {
                    html += `<div class="linea-derecho">${l.txt}: <b>${l.val.toLocaleString('es-ES',{minimumFractionDigits:2})} €</b></div>`;
                    copy += `${l.txt}: ${l.val.toLocaleString('es-ES',{minimumFractionDigits:2})} €\n`;
                });
                html += `<div class="total-persona">Total para ${n.toUpperCase()}: ${usuarios[n].total.toLocaleString('es-ES',{minimumFractionDigits:2})} €</div></div>`;
                copy += `Total para ${n.toUpperCase()}: ${usuarios[n].total.toLocaleString('es-ES',{minimumFractionDigits:2})} €\n\n`;
            }

            document.getElementById('total-verde-final').innerHTML = `<b style="font-size:18px; color:#064e3b;">Total repartido: ${totalGeneral.toLocaleString('es-ES',{minimumFractionDigits:2})} €</b>`;
            copy += `Total repartido: ${totalGeneral.toLocaleString('es-ES',{minimumFractionDigits:2})} €`;

            document.getElementById('res-reparto').classList.remove('hidden');
            document.getElementById('lista-resultados-usuf').innerHTML = html;
            document.getElementById('texto-para-copiar').innerText = copy;
        }

        function copiarUsufructo() {
            const texto = document.getElementById('texto-para-copiar').innerText;
            if (!texto) return alert("No hay resultados");
            navigator.clipboard.writeText(texto).then(() => alert("✅ Copiado al portapapeles"));
        }

        function generarPDF() {
            const element = document.createElement('div');
            element.style.padding = "40px";
            element.style.fontFamily = "Arial, sans-serif";
            
            const contenido = document.getElementById('lista-resultados-usuf').innerHTML;
            const azul = document.getElementById('info-azul').innerText;
            const detalle = document.getElementById('info-detallada-pct').innerText;
            const total = document.getElementById('total-verde-final').innerHTML;

            element.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #3b82f6; padding-bottom:10px; margin-bottom:20px;">
                    <h2 style="color:#1e40af; margin:0;">CÁLCULOS REPARTO</h2>
                    <img src="logom.png" style="max-height:50px;">
                </div>
                <div style="background:#eff6ff; color:#1e40af; padding:15px; border-radius:8px; border:1px solid #bfdbfe; font-weight:bold; margin-bottom:5px;">${azul}</div>
                <div style="color:#64748b; font-size:13px; margin-bottom:25px; padding-left:5px;">${detalle}</div>
                <div>${contenido}</div>
                <div style="margin-top:20px; padding:15px; background:#ecfdf5; border-radius:8px; border-left:4px solid #10b981; text-align:center;">${total}</div>
                <div style="margin-top:40px; text-align:center; font-size:10px; color:#94a3b8; border-top:1px solid #e2e8f0; padding-top:10px;">
                    Informe privado generado por MarBlau el ${new Date().toLocaleDateString('es-ES')}
                </div>
            `;

            const opt = {
                margin: 10,
                filename: 'Reparto_MarBlau.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
