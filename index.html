<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MarBlau - Cálculo de Reparto</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body onload="iniciarApp()">

    <div id="login-box" class="contenedor" style="margin-top: 100px; text-align: center;">
        <div class="tarjeta">
            <img src="logom.png" alt="MarBlau" style="max-width: 180px; margin-bottom: 20px;">
            <p style="font-weight: 700; color: #64748b; margin-bottom: 20px;">SISTEMA DE CÁLCULO PRIVADO</p>
            <input type="password" id="pass_input" style="text-align: center; width: 100%; max-width: 300px; margin-bottom: 15px;" placeholder="Contraseña">
            <button class="btn-calcular" style="display: block; margin: auto; max-width: 300px;" onclick="comprobarPass()">ENTRAR</button>
        </div>
    </div>

    <div id="contenido-privado" class="contenedor hidden">
        <div class="nav-menu">
            <button class="activo">Usufructo</button>
            <button onclick="location.href='plusvalia.html'">Plusvalía</button>
            <button onclick="cerrarSesion()" style="background:#fee2e2; color:#ef4444;">Salir</button>
        </div>

        <div class="tarjeta">
            <div style="text-align: center; margin-bottom: 15px;"><img src="logom.png" style="max-width: 90px;"></div>
            <h1>Cálculo de Reparto</h1>
            
            <div class="fila-inputs">
                <div class="campo">
                    <label>VALOR TOTAL PROPIEDAD (€)</label>
                    <input type="number" id="v_prop" placeholder="Ej: 200000">
                </div>
                <div class="campo">
                    <label>FECHA TRANSMISIÓN</label>
                    <input type="date" id="f_trans">
                </div>
            </div>

            <div id="contenedor-titulares">
                </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn-añadir" onclick="agregarTitular()">+ Añadir Titular</button>
                <button class="btn-calcular" onclick="calcularReparto()">CALCULAR REPARTO</button>
            </div>
        </div>

        <div id="res-reparto" class="tarjeta hidden">
            <button class="btn-copiar-usuf" onclick="copiarUsufructo()">Copiar Resultados</button>
            <div id="meta-usuf" class="bloque-resumen-azul"></div>
            <div id="lista-resultados-usuf"></div>
        </div>
    </div>

    <script>
        const CLAVE = "marblau2026";

        function iniciarApp() {
            verificarAcceso();
            recuperarDatos();
            if (document.getElementById('contenedor-titulares').children.length === 0) agregarTitular();
        }

        function comprobarPass() {
            if(document.getElementById('pass_input').value === CLAVE) {
                localStorage.setItem('sesion_marblau', 'ok');
                verificarAcceso();
            } else { alert("Error de acceso"); }
        }

        function verificarAcceso() {
            if(localStorage.getItem('sesion_marblau') === 'ok') {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('contenido-privado').classList.remove('hidden');
            }
        }

        function cerrarSesion() {
            localStorage.clear();
            location.reload();
        }

        function guardarDatos() {
            const titulares = Array.from(document.querySelectorAll('.titular-row')).map(row => ({
                n: row.querySelector('.t-nombre').value,
                t: row.querySelector('.t-tipo').value,
                p: row.querySelector('.t-pct').value,
                f: row.querySelector('.t-fecha').value
            }));
            const datos = { v: document.getElementById('v_prop').value, f: document.getElementById('f_trans').value, tits: titulares };
            localStorage.setItem('datos_usuf', JSON.stringify(datos));
        }

        function recuperarDatos() {
            const data = JSON.parse(localStorage.getItem('datos_usuf'));
            if(data) {
                document.getElementById('v_prop').value = data.v;
                document.getElementById('f_trans').value = data.f;
                data.tits.forEach(t => agregarTitular(t));
            }
        }

        function agregarTitular(data = null) {
            const div = document.createElement('div');
            div.className = 'titular-row';
            div.style = "display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-end;";
            div.innerHTML = `
                <div class="campo" style="flex:2;"><label>Nombre</label><input type="text" class="t-nombre" value="${data?data.n:''}" oninput="guardarDatos()"></div>
                <div class="campo" style="flex:1.5;"><label>Tipo</label><select class="t-tipo" onchange="guardarDatos()">
                    <option value="pd" ${data&&data.t=='pd'?'selected':''}>Pleno Dominio</option>
                    <option value="us" ${data&&data.t=='us'?'selected':''}>Usufructo</option>
                    <option value="np" ${data&&data.t=='np'?'selected':''}>Nuda Propiedad</option>
                </select></div>
                <div class="campo" style="flex:0.8;"><label>%</label><input type="number" class="t-pct" value="${data?data.p:'100'}" oninput="guardarDatos()"></div>
                <div class="campo" style="flex:1.2;"><label>F. Nac</label><input type="date" class="t-fecha" value="${data?data.f:''}" oninput="guardarDatos()"></div>
                <button class="btn-borrar" onclick="this.parentElement.remove(); guardarDatos();">×</button>
            `;
            document.getElementById('contenedor-titulares').appendChild(div);
        }

        function calcularReparto() {
            const valorTotal = parseFloat(document.getElementById('v_prop').value);
            const fechaTrans = new Date(document.getElementById('f_trans').value);
            let html = "";
            let textoCopiar = "INFORME DE REPARTO - MARBLAU\n--------------------------\n";

            document.querySelectorAll('.titular-row').forEach(row => {
                const nombre = row.querySelector('.t-nombre').value;
                const tipo = row.querySelector('.t-tipo').value;
                const pct = parseFloat(row.querySelector('.t-pct').value) / 100;
                const fNac = new Date(row.querySelector('.t-fecha').value);
                
                let edad = fechaTrans.getFullYear() - fNac.getFullYear();
                let u = 89 - edad;
                if(u < 10) u = 10;
                if(u > 70) u = 70;

                let v_final = 0;
                let desc = "";

                if(tipo === 'pd') { v_final = valorTotal * pct; desc = "Pleno Dominio"; }
                else if(tipo === 'us') { v_final = (valorTotal * (u/100)) * pct; desc = `Usufructo (${u}%)`; }
                else { v_final = (valorTotal * (1 - u/100)) * pct; desc = `Nuda Propiedad (${100-u}%)`; }

                html += `<div class="resultado-titular">
                            <span class="nombre-titular">${nombre} - ${desc}</span>
                            <div class="total-titular">${v_final.toLocaleString('es-ES', {minimumFractionDigits:2})} €</div>
                         </div>`;
                textoCopiar += `${nombre}: ${desc} -> ${v_final.toLocaleString('es-ES', {minimumFractionDigits:2})} €\n`;
            });

            document.getElementById('res-reparto').classList.remove('hidden');
            document.getElementById('lista-resultados-usuf').innerHTML = html;
            document.getElementById('meta-usuf').dataset.copy = textoCopiar;
            document.getElementById('meta-usuf').innerText = "Cálculo realizado según fecha de transmisión.";
        }

        function copiarUsufructo() {
            const txt = document.getElementById('meta-usuf').dataset.copy;
            navigator.clipboard.writeText(txt);
            alert("Copiado al portapapeles");
        }
    </script>
</body>
</html>
