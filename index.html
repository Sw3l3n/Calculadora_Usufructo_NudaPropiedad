<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarBlau - CÁLCULOS REPARTO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* ESTILOS WEB ORIGINALES (NO TOCADOS) */
        .resumen-propietario { border-left: 4px solid #3b82f6; padding: 15px; margin-bottom: 20px; background: #f8fafc; border-radius: 0 8px 8px 0; }
        .label-propietario { font-size: 14px; font-weight: 800; color: #475569; text-transform: uppercase; margin-bottom: 5px; }
        .linea-derecho { font-size: 15px; margin: 4px 0; color: #1e293b; }
        .total-persona { font-weight: 700; color: #0f172a; margin-top: 8px; font-size: 16px; border-top: 1px solid #e2e8f0; padding-top: 5px; }
        .info-calculo-azul { background: #eff6ff; color: #1e40af; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #bfdbfe; font-size: 14px; font-weight: 600; }
        .info-reparto-detallado { font-size: 13px; color: #64748b; margin-bottom: 25px; padding-left: 5px; font-weight: 500; }
        .tarjeta-total-final { border-left: 4px solid #10b981; padding: 20px; background: #ecfdf5; border-radius: 0 8px 8px 0; margin-top: 20px; text-align: center; }
        .fila-botones-accion { display: flex; gap: 12px; margin-bottom: 25px; }
        .btn-accion { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; font-size: 13px; }
        .btn-copiar-new { background: #3b82f6; color: white; }
        .btn-pdf-new { background: #1e293b; color: white; }
    </style>
</head>
<body onload="iniciarApp()">

    <div id="login-box" class="contenedor" style="margin-top: 80px; text-align: center;">
        <div class="tarjeta">
            <img src="logom.png" alt="MarBlau" style="max-width: 160px; margin-bottom: 20px;">
            <p style="font-weight: 700; color: #64748b; margin-bottom: 20px;">SISTEMA DE CÁLCULO PRIVADO</p>
            <input type="password" id="pass_input" style="text-align: center; width: 100%; max-width: 280px; margin-bottom: 15px;" placeholder="Contraseña">
            <button class="btn-calcular" style="display: block; margin: auto; width: 100%; max-width: 280px;" onclick="comprobarPass()">ENTRAR</button>
        </div>
    </div>

    <div id="contenido-privado" class="contenedor hidden">
        <div class="nav-menu">
            <button class="activo">Usufructo</button>
            <button onclick="location.href='plusvalia.html'">Plusvalía</button>
            <button onclick="cerrarSesion()" style="background:#fee2e2; color:#ef4444;">Salir</button>
        </div>

        <div class="tarjeta">
            <div style="text-align: center; margin-bottom: 10px;"><img src="logom.png" style="max-width: 80px;"></div>
            <h1>CÁLCULOS REPARTO</h1>
            <div class="fila-inputs">
                <div class="campo">
                    <label>VALOR TOTAL PROPIEDAD (€)</label>
                    <input type="number" id="v_prop" placeholder="0.00" oninput="guardarDatos()">
                </div>
                <div class="campo">
                    <label>FECHA TRANSMISIÓN</label>
                    <input type="date" id="f_trans" oninput="guardarDatos()">
                </div>
            </div>
            <div id="contenedor-titulares"></div>
            <div style="display: flex; gap: 10px; margin-top: 25px;">
                <button class="btn-añadir" onclick="agregarTitular()">+ Añadir Titular</button>
                <button class="btn-calcular" onclick="validarYCalcular()">CALCULAR REPARTO</button>
            </div>
        </div>

        <div id="res-reparto" class="tarjeta hidden">
            <h2 style="text-align:center;">CÁLCULOS REPARTO</h2>
            <div class="fila-botones-accion">
                <button class="btn-accion btn-copiar-new" onclick="copiarUsufructo()">📋 Copiar Texto</button>
                <button class="btn-accion btn-pdf-new" onclick="generarPDF()">📄 Descargar PDF</button>
            </div>
            <div id="info-azul" class="info-calculo-azul"></div>
            <div id="info-detallada-pct" class="info-reparto-detallado"></div>
            <div id="lista-resultados-usuf"></div>
            <div id="total-verde-final" class="tarjeta-total-final"></div>
            <div id="texto-para-copiar" style="display:none;"></div>
        </div>
    </div>

    <script>
        const CLAVE = "marblau2026";
        function iniciarApp() { verificarAcceso(); if (!recuperarDatos()) agregarTitular(); }
        function comprobarPass() { if(document.getElementById('pass_input').value === CLAVE) { localStorage.setItem('sesion_marblau', 'ok'); verificarAcceso(); } else { alert("Acceso denegado."); } }
        function verificarAcceso() { if(localStorage.getItem('sesion_marblau') === 'ok') { document.getElementById('login-box').classList.add('hidden'); document.getElementById('contenido-privado').classList.remove('hidden'); } }
        function cerrarSesion() { localStorage.clear(); location.reload(); }

        function agregarTitular(data = null) {
            const div = document.createElement('div');
            div.className = 'titular-row';
            div.style = "display: flex; gap: 10px; margin-bottom: 12px; align-items: flex-end; background:#f8fafc; padding:10px; border-radius:8px;";
            div.innerHTML = `
                <div class="campo" style="flex:2;"><label>Nombre</label><input type="text" class="t-nombre" value="${data?data.n:''}" oninput="guardarDatos()"></div>
                <div class="campo" style="flex:1.5;"><label>Tipo</label>
                    <select class="t-tipo" onchange="toggleFecha(this)">
                        <option value="pd" ${data&&data.t=='pd'?'selected':''}>Pleno Dominio</option>
                        <option value="us" ${data&&data.t=='us'?'selected':''}>Usufructo</option>
                        <option value="np" ${data&&data.t=='np'?'selected':''}>Nuda Propiedad</option>
                    </select>
                </div>
                <div class="campo" style="flex:0.8;"><label>%</label><input type="number" class="t-pct" value="${data?data.p:'0'}" oninput="guardarDatos()"></div>
                <div class="campo" style="flex:1.2;"><label>F. Nac</label><input type="date" class="t-fecha" value="${data?data.f:''}" oninput="guardarDatos()" ${data&&data.t=='us'?'':'disabled style="opacity:0.4"'}></div>
                <button class="btn-borrar" onclick="this.parentElement.remove(); guardarDatos();">×</button>
            `;
            document.getElementById('contenedor-titulares').appendChild(div);
        }

        function toggleFecha(sel) {
            const f = sel.parentElement.parentElement.querySelector('.t-fecha');
            if (sel.value === 'us') { f.disabled = false; f.style.opacity = "1"; }
            else { f.value = ""; f.disabled = true; f.style.opacity = "0.4"; }
            guardarDatos();
        }

        function validarYCalcular() {
            const filas = Array.from(document.querySelectorAll('.titular-row'));
            let sPD = 0, sUS = 0, sNP = 0;
            filas.forEach(r => {
                const t = r.querySelector('.t-tipo').value;
                const p = parseFloat(r.querySelector('.t-pct').value) || 0;
                if(t === 'pd') sPD += p; else if(t === 'us') sUS += p; else sNP += p;
            });
            if (Math.abs((sPD + sUS) - 100) > 0.01 || Math.abs((sPD + sNP) - 100) > 0.01) {
                alert(`REPARTO INCORRECTO:\nLa suma de Pleno Dominio + Usufructo debe ser 100% (Actual: ${sPD+sUS}%)\nLa suma de Pleno Dominio + Nuda Propiedad debe ser 100% (Actual: ${sPD+sNP}%)`);
                return;
            }
            calcularReparto();
        }

        function calcularReparto() {
            const valorTotal = parseFloat(document.getElementById('v_prop').value);
            const fechaTrans = new Date(document.getElementById('f_trans').value);
            if(!valorTotal || isNaN(fechaTrans)) return alert("Faltan datos.");

            const filas = Array.from(document.querySelectorAll('.titular-row'));
            let edadUsuf = 0, uCoefLegal = 0; 
            const usufructuarios = filas.filter(r => r.querySelector('.t-tipo').value === 'us');
            if (usufructuarios.length > 0) {
                let fReciente = null;
                usufructuarios.forEach(r => {
                    const fn = new Date(r.querySelector('.t-fecha').value);
                    if (!isNaN(fn) && (!fReciente || fn > fReciente)) fReciente = fn;
                });
                if (fReciente) {
                    edadUsuf = fechaTrans.getFullYear() - fReciente.getFullYear();
                    if (fechaTrans < new Date(fechaTrans.getFullYear(), fReciente.getMonth(), fReciente.getDate())) edadUsuf--;
                    uCoefLegal = Math.max(10, Math.min(70, 89 - edadUsuf));
                }
            }

            const usuarios = {};
            let sumPd = 0, sumUs = 0, sumNp = 0, totalGen = 0;
            filas.forEach(row => {
                const n = row.querySelector('.t-nombre').value.trim().toUpperCase() || "TITULAR";
                const t = row.querySelector('.t-tipo').value;
                const p = parseFloat(row.querySelector('.t-pct').value) || 0;
                let v = 0, txt = "";
                if (t === 'pd') { v = valorTotal * (p/100); txt = `Pleno dominio (${p}%)`; sumPd += p; }
                else if (t === 'us') { v = (valorTotal * (uCoefLegal/100)) * (p/100); txt = `Usufructo (${p}%)`; sumUs += p; }
                else { v = (valorTotal * (1 - uCoefLegal/100)) * (p/100); txt = `Nuda propiedad (${p}%)`; sumNp += p; }

                if (!usuarios[n]) usuarios[n] = { lineas: [], total: 0 };
                usuarios[n].lineas.push({ txt, v });
                usuarios[n].total += v;
                totalGen += v;
            });

            const fA = `Edad usufructuario para el calculo: ${edadUsuf > 0 ? edadUsuf : 'N/A'} años, usufructo ${uCoefLegal}%`;
            const fD = `Desglose: PD: ${sumPd}% | US: ${sumUs}% | NP: ${sumNp}%`;
            document.getElementById('info-azul').innerText = fA;
            document.getElementById('info-detallada-pct').innerText = fD;

            let h = "", c = `CÁLCULOS REPARTO\n\n${fA}\n${fD}\n\n`;
            for (const n in usuarios) {
                h += `<div class="resumen-propietario"><div class="label-propietario">Propietario: ${n}</div>`;
                c += `Propietario: ${n}\n`;
                usuarios[n].lineas.forEach(l => {
                    h += `<div class="linea-derecho">${l.txt}: <b>${l.v.toLocaleString('es-ES',{minimumFractionDigits:2})} €</b></div>`;
                    c += `${l.txt}: ${l.v.toLocaleString('es-ES',{minimumFractionDigits:2})} €\n`;
                });
                h += `<div class="total-persona">TOTAL ${n}: ${usuarios[n].total.toLocaleString('es-ES',{minimumFractionDigits:2})} €</div></div>`;
                c += `TOTAL ${n}: ${usuarios[n].total.toLocaleString('es-ES',{minimumFractionDigits:2})} €\n\n`;
            }
            document.getElementById('total-verde-final').innerHTML = `<b>TOTAL REPARTIDO: ${totalGen.toLocaleString('es-ES',{minimumFractionDigits:2})} €</b>`;
            document.getElementById('res-reparto').classList.remove('hidden');
            document.getElementById('lista-resultados-usuf').innerHTML = h;
            document.getElementById('texto-para-copiar').innerText = c;
        }

        // --- FUNCIÓN PDF DE ALTA CALIDAD ---
        function generarPDF() {
            const opt = {
                margin: 15,
                filename: 'Reparto_MarBlau.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 3, useCORS: true, letterRendering: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: 'css', before: '.page-break' }
            };

            const element = document.createElement('div');
            element.style.width = "180mm"; 
            element.style.fontFamily = "Arial, sans-serif";

            // Datos actuales
            const infoA = document.getElementById('info-azul').innerText;
            const infoD = document.getElementById('info-detallada-pct').innerText;
            const items = Array.from(document.querySelectorAll('.resumen-propietario'));
            const totalF = document.getElementById('total-verde-final').innerText;

            let content = `
                <div style="position: fixed; top: 40%; left: 0; width: 100%; text-align: center; transform: rotate(-45deg); font-size: 80px; color: rgba(220, 220, 220, 0.3); font-weight: bold; z-index: -1;">CONFIDENCIAL</div>
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1e40af; padding-bottom: 10px; margin-bottom: 20px;">
                    <h1 style="color: #1e40af; margin: 0; font-size: 20px;">CÁLCULOS REPARTO</h1>
                    <img src="logom.png" style="height: 45px;">
                </div>
                <div style="background: #f1f5f9; padding: 15px; border-radius: 5px; margin-bottom: 25px; border: 1px solid #cbd5e1;">
                    <div style="font-weight: bold; color: #1e40af; font-size: 13px;">${infoA}</div>
                    <div style="color: #64748b; font-size: 11px; margin-top: 4px;">${infoD}</div>
                </div>
            `;

            items.forEach((item, index) => {
                // Forzar salto de página si es necesario para evitar cortes feos
                content += `
                <div style="margin-bottom: 20px; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; page-break-inside: avoid;">
                    <div style="font-weight: bold; color: #1e40af; border-bottom: 1px solid #f1f5f9; padding-bottom: 5px; margin-bottom: 10px; text-transform: uppercase; font-size: 12px;">
                        ${item.querySelector('.label-propietario').innerText}
                    </div>
                    ${Array.from(item.querySelectorAll('.linea-derecho')).map(l => `
                        <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px;">
                            <span>${l.innerText.split(':')[0]}</span>
                            <span style="font-weight: bold;">${l.innerText.split(':')[1]}</span>
                        </div>
                    `).join('')}
                    <div style="margin-top: 8px; padding-top: 8px; border-top: 1.5px solid #1e40af; text-align: right; font-weight: bold; font-size: 14px; color: #1e293b;">
                        ${item.querySelector('.total-persona').innerText}
                    </div>
                </div>`;
            });

            content += `
                <div style="margin-top: 30px; padding: 20px; background: #1e40af; color: white; border-radius: 8px; text-align: center; font-size: 18px; font-weight: bold;">
                    ${totalF}
                </div>
                <div style="margin-top: 50px; text-align: center; font-size: 9px; color: #94a3b8; border-top: 1px solid #f1f5f9; padding-top: 10px;">
                    Documento privado e informativo generado el ${new Date().toLocaleDateString('es-ES')} - MarBlau
                </div>
            `;

            element.innerHTML = content;
            html2pdf().set(opt).from(element).save();
        }

        function copiarUsufructo() { navigator.clipboard.writeText(document.getElementById('texto-para-copiar').innerText).then(() => alert("Copiado")); }
        function guardarDatos() {
            const tits = Array.from(document.querySelectorAll('.titular-row')).map(r => ({ n: r.querySelector('.t-nombre').value, t: r.querySelector('.t-tipo').value, p: r.querySelector('.t-pct').value, f: r.querySelector('.t-fecha').value }));
            localStorage.setItem('datos_usuf', JSON.stringify({ v: document.getElementById('v_prop').value, f: document.getElementById('f_trans').value, tits }));
        }
        function recuperarDatos() {
            const d = JSON.parse(localStorage.getItem('datos_usuf'));
            if(d) { document.getElementById('v_prop').value = d.v; document.getElementById('f_trans').value = d.f; d.tits.forEach(t => agregarTitular(t)); return true; }
            return false;
        }
    </script>
</body>
</html>
