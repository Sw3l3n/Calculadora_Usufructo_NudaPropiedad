<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MarBlau - Gestión Usufructos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body onload="iniciarApp()">

    <div id="login-box" class="contenedor" style="margin-top: 100px;">
        <div class="tarjeta" style="text-align: center;">
            <img src="logom.png" alt="MarBlau" style="max-width: 180px; margin-bottom: 20px;">
            <p style="font-weight: 700; color: #64748b; margin-bottom: 20px;">SISTEMA DE CÁLCULO PRIVADO</p>
            <input type="password" id="pass_input" style="text-align: center; width: 100%; max-width: 300px; margin-bottom: 15px;" placeholder="Contraseña">
            <button class="btn-calcular" style="display: block; margin: auto; width: 100%; max-width: 300px;" onclick="comprobarPass()">Entrar</button>
        </div>
    </div>

    <div id="contenido-privado" class="contenedor hidden">
        <div class="nav-menu">
            <button class="activo">Usufructo</button>
            <button onclick="location.href='plusvalia.html'">Plusvalía</button>
            <button onclick="cerrarSesion()" style="background:#fee2e2; color:#ef4444;">Salir</button>
        </div>

        <div class="tarjeta">
            <div style="text-align: center; margin-bottom: 20px;"><img src="logom.png" style="max-width: 100px;"></div>
            <h1 style="text-align: center; margin-bottom: 30px;">Cálculo de Reparto</h1>
            
            <div class="fila-inputs">
                <div class="campo" style="flex: 2;">
                    <label>Valor total propiedad (€)</label>
                    <input type="number" id="valor_propiedad" placeholder="Ej: 200000" style="font-weight: 800; font-size: 20px;">
                </div>
                <div class="campo" style="flex: 1;">
                    <label>Fecha transmisión</label>
                    <input type="date" id="fecha_venta">
                </div>
            </div>

            <h2 style="font-size: 14px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; color: #64748b;">TITULARES Y DERECHOS</h2>
            <div id="contenedor-titulares"></div>
            
            <div style="margin-top: 25px; display: flex; gap: 15px;">
                <button class="btn-añadir" onclick="agregarTitular()">+ Añadir Titular</button>
                <button class="btn-calcular" onclick="generarInforme()" style="flex-grow: 1;">Calcular Reparto</button>
            </div>
        </div>

        <div id="seccion-informe" class="tarjeta hidden">
            <h2 style="margin-top: 0; font-size: 18px; color: var(--accent-color); border-bottom: 1px solid #e2e8f0; padding-bottom: 10px;">Desglose de la Operación</h2>
            
            <div id="metadatos-azul" class="bloque-resumen-azul"></div>
            
            <div id="resultados-lista">
                </div>
        </div>
    </div>

    <script>
        const CLAVE = "pagame";

        function iniciarApp() {
            document.getElementById('fecha_venta').valueAsDate = new Date();
            if(sessionStorage.getItem('sesion_marblau') === 'ok') verificarAcceso();
        }

        function comprobarPass() {
            if(document.getElementById('pass_input').value === CLAVE) {
                sessionStorage.setItem('sesion_marblau', 'ok');
                verificarAcceso();
            } else { alert("Acceso denegado"); }
        }

        function verificarAcceso() {
            if(sessionStorage.getItem('sesion_marblau') === 'ok') {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('contenido-privado').classList.remove('hidden');
            }
        }

        function cerrarSesion() { sessionStorage.clear(); location.reload(); }

        function agregarTitular() {
            const div = document.createElement('div');
            div.className = 'titular-row fila-inputs';
            div.innerHTML = `
                <div class="campo" style="flex:2.5;"><label>Nombre</label><input type="text" class="t-nombre" placeholder="Ej: Juan Pérez"></div>
                <div class="campo" style="flex:1.5;"><label>Tipo</label>
                    <select class="t-tipo" onchange="this.parentElement.parentElement.querySelector('.t-fecha').disabled=(this.value!=='usufructo')">
                        <option value="pleno">Pleno dominio</option>
                        <option value="nuda">Nuda propiedad</option>
                        <option value="usufructo">Usufructo</option>
                    </select>
                </div>
                <div class="campo" style="flex:0.6;"><label>%</label><input type="number" class="t-pct" value="100"></div>
                <div class="campo" style="flex:1.2;"><label>Fecha Nac.</label><input type="date" class="t-fecha" disabled></div>
                <button class="btn-borrar" onclick="this.parentElement.remove()">×</button>
            `;
            document.getElementById('contenedor-titulares').appendChild(div);
        }

        function generarInforme() {
            const valorTotal = parseFloat(document.getElementById('valor_propiedad').value);
            const fechaVentaStr = document.getElementById('fecha_venta').value;
            const filas = document.querySelectorAll('.titular-row');
            
            if(!valorTotal || !fechaVentaStr || filas.length === 0) return alert("Faltan datos");

            const fechaRef = new Date(fechaVentaStr);
            let edadMenor = 999;
            let tieneUsufructo = false;

            filas.forEach(f => {
                if(f.querySelector('.t-tipo').value === 'usufructo' && f.querySelector('.t-fecha').value) {
                    tieneUsufructo = true;
                    let fNac = new Date(f.querySelector('.t-fecha').value);
                    let edad = fechaRef.getFullYear() - fNac.getFullYear();
                    if (fechaRef.getMonth() < fNac.getMonth() || (fechaRef.getMonth() === fNac.getMonth() && fechaRef.getDate() < fNac.getDate())) edad--;
                    if(edad < edadMenor) edadMenor = edad;
                }
            });

            const uPct = tieneUsufructo ? Math.max(10, Math.min(70, 89 - edadMenor)) : 0;
            const nPct = 100 - uPct;
            
            const cajaAzul = document.getElementById('metadatos-azul');
            if(!tieneUsufructo) {
                cajaAzul.classList.add('hidden');
            } else {
                cajaAzul.classList.remove('hidden');
                cajaAzul.innerHTML = `
                    <div class="resumen-linea-1">Coeficiente Usufructo: ${uPct}% (Edad: ${edadMenor} años)</div>
                    <div class="resumen-linea-2">Coeficiente Nuda Propiedad: ${nPct}%</div>
                `;
            }

            let htmlResultados = "";
            let propietarios = {};

            filas.forEach(f => {
                let nombre = (f.querySelector('.t-nombre').value || "Titular").trim();
                let tipo = f.querySelector('.t-tipo').value;
                let pctInmueble = parseFloat(f.querySelector('.t-pct').value) || 0;
                let valorCalculado = 0;
                let tipoTxt = "";

                if(tipo === 'usufructo') { 
                    valorCalculado = (valorTotal * (pctInmueble/100)) * (uPct/100); 
                    tipoTxt = "Usufructo vitalicio"; 
                } else if(tipo === 'nuda') { 
                    valorCalculado = (valorTotal * (pctInmueble/100)) * (nPct/100); 
                    tipoTxt = "Nuda propiedad"; 
                } else { 
                    valorCalculado = valorTotal * (pctInmueble/100); 
                    tipoTxt = "Pleno dominio"; 
                }

                if(!propietarios[nombre]) propietarios[nombre] = { items: [], total: 0 };
                propietarios[nombre].items.push({txt: tipoTxt, pct: pctInmueble, val: valorCalculado});
                propietarios[nombre].total += valorCalculado;
            });

            for(let p in propietarios) {
                htmlResultados += `
                    <div class="resultado-titular">
                        <span class="nombre-titular">${p.toUpperCase()}</span>
                        ${propietarios[p].items.map(i => `
                            <div class="detalle-item">• ${i.txt} (${i.pct}%): <strong>${i.val.toLocaleString('es-ES', {minimumFractionDigits:2})} €</strong></div>
                        `).join('')}
                        <div class="total-titular">Total: ${propietarios[p].total.toLocaleString('es-ES', {minimumFractionDigits:2})} €</div>
                    </div>
                `;
            }

            document.getElementById('seccion-informe').classList.remove('hidden');
            document.getElementById('resultados-lista').innerHTML = htmlResultados;
        }

        agregarTitular();
    </script>
</body>
</html>
